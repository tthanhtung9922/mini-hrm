services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: mini-hrm/api:latest        # <-- tên image
    container_name: mini-hrm-api      # <-- tên container
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=MiniHRM;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True
      - Seq__ServerUrl=http://seq:5341
    depends_on:
      sqlserver:
        condition: service_healthy
      seq:
        condition: service_started
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: mini-hrm-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${MSSQL_SA_PASSWORD}" -Q "SELECT 'DB OK!'" -C -b
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  seq:
    image: datalust/seq:latest
    container_name: mini-hrm-seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_FIRSTRUN_ADMINPASSWORD}
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  sqlserver-data:
    name: mini-hrm-sqlserver-data
  seq-data:
    name: mini-hrm-seq-data